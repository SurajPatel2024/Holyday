 <!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Homework Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --green: #25D366; --dark: #075E54; --bg: #e9edef; --red: #ff4757; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg); 
            margin: 0; padding: 10px; touch-action: manipulation; 
            display: flex; flex-direction: column; min-height: 100vh;
        }

        @media screen and (min-width: 769px) {
            body { background: #000; color: white; align-items: center; justify-content: center; text-align: center; height: 100vh; }
            .app-card, footer { display: none; }
            body::after { content: "⚠️ Please use Mobile View (Suraj Patel Portal)"; font-size: 18px; }
        }

        .app-card { 
            max-width: 450px; margin: auto; background: #fff; 
            border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); flex: 1;
        }

        .header-ui { text-align: center; border-bottom: 2px solid var(--green); padding-bottom: 8px; margin-bottom: 12px; }
        .logo-ui { width: 60px; height: 60px; object-fit: contain; mix-blend-mode: multiply; }

        .input-row { display: flex; gap: 5px; margin-bottom: 8px; }
        input { 
            border: 1px solid #ccc; padding: 10px; border-radius: 6px; 
            font-size: 16px !important; outline: none; width: 100%;
        }
        .sub-n { width: 35%; font-weight: bold; color: var(--dark); border-left: 3px solid var(--green); }
        .sub-w { width: 65%; }

        .actions { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        button { padding: 12px; border: none; border-radius: 8px; font-weight: bold; font-size: 15px; cursor: pointer; }
        .btn-add { background: #fff; color: var(--dark); border: 1px dashed var(--green); }
        .btn-clear { background: #fff; color: var(--red); border: 1px solid var(--red); margin-top: 5px; }
        #btn-gen { background: var(--dark); color: #fff; margin-top: 5px; }

        #result-area { display: none; margin-top: 15px; }
        #preview-img { width: 100%; border: 2px solid var(--green); border-radius: 10px; margin-bottom: 10px; }
        .bottom-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        #btn-share { background: var(--green); color: #fff; }
        #btn-down { background: #444; color: #fff; }

        footer { text-align: center; padding: 15px; font-size: 13px; color: #666; background: #fff; border-top: 1px solid #ddd; margin-top: 20px; }

        #custom-alert {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: var(--red); color: white; padding: 10px 20px;
            border-radius: 20px; font-weight: bold; z-index: 1000; transition: top 0.4s;
        }
        #custom-alert.show { top: 20px; }

        #capture-area { position: absolute; left: -9999px; width: 600px; background: #fff; }
        .png-header { 
            background: var(--green); color: white; 
            padding: 5px 30px; 
            display: flex; align-items: flex-end; justify-content: center; gap: 15px;
            height: 100px; 
        }
        .png-header img { width: 110px; height: 110px; mix-blend-mode: multiply; object-fit: contain; margin-bottom: -5px; }
        .png-header h1 { margin: 0; font-size: 34px; text-transform: uppercase; padding-bottom: 25px; }
        
        .png-body { padding: 25px 35px; }
        .png-date { text-align: right; font-size: 22px; font-weight: bold; margin-bottom: 15px; color: var(--dark); }
        
        .hw-table { width: 100%; border-collapse: collapse; border: 3px solid var(--green); }
        .hw-table td { padding: 18px; border: 1.5px solid #c9e7d5; font-size: 20px; color: #333; }
        .tag-sub { background: #f0fff4; font-weight: 900; width: 30%; border-right: 3px solid var(--green) !important; text-transform: uppercase; }
        
        
        /* Loading Overlay Style */
#loading-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(255, 255, 255, 0.9);
    z-index: 2000;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.spinner {
    width: 50px;
    height: 50px;
    border: 5px solid var(--bg);
    border-top: 5px solid var(--green);
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.loading-text {
    margin-top: 15px;
    font-weight: bold;
    color: var(--dark);
}

    </style>
</head>
<body>

<div id="custom-alert"></div>

<div class="app-card">
    <div class="header-ui">
        <img src="https://i.ibb.co/SDLXGQ1b/images.png" class="logo-ui">
        <h4 style="margin: 5px 0; color: var(--dark);">Homework Portal</h4>
    </div>
    
    <div id="input-container"></div>

    <div class="actions">
        <button class="btn-add" onclick="addSubject('', '')">➕ Add Custom Subject</button>
        <button id="btn-gen">📸 Create Homework Image</button>
        <div id="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">Generating Image...</div>
</div>

        <button class="btn-clear" onclick="clearAllData()">🗑️ Remove All Data</button>
    </div>

    <div id="result-area">
        <img id="preview-img">
        <div class="bottom-btns">
            <button id="btn-share">📤 Share</button>
            <button id="btn-down">💾 Save</button>
        </div>
    </div>
</div>

<footer>
    Designed & Maintained by <br>
    <strong>Suraj Patel</strong> | Varanasi
</footer>

<div id="capture-area">
    <div class="png-header">
        <img src="https://i.ibb.co/SDLXGQ1b/images.png" crossorigin="anonymous">
        <h1>Today's Homework</h1>
    </div>
    <div class="png-body">
        <div class="png-date" id="date-label"></div>
        <table class="hw-table" id="hw-table"></table>
        <div style="margin-top: 20px; text-align: center; color: #999; font-size: 14px;">KSP Public School | Varanasi</div>
    </div>
</div>

<script>
    const container = document.getElementById('input-container');
    const alertBox = document.getElementById('custom-alert');

    // --- YAHAN SUBJECTS BADLAYEIN ---
    function loadData() {
        const saved = JSON.parse(localStorage.getItem('hwData'));
        
        // Agar pehle se kuch saved nahi hai, toh ye list dikhegi
        const defaultSubjects = [
            {n: 'Computer', w: ''},
            {n: 'Hindi', w: ''},
            {n: 'Maths', w: ''},
            {n: 'Science', w: ''},
            {n: 'English', w: ''},
            {n: 'S.ST', w: ''}
        ];

        const dataToLoad = saved || defaultSubjects;
        container.innerHTML = '';
        dataToLoad.forEach(item => addSubject(item.n, item.w));
    }

    function saveData() {
        const rows = [];
        document.querySelectorAll('.input-row').forEach(row => {
            rows.push({
                n: row.querySelector('.sub-n').value,
                w: row.querySelector('.sub-w').value
            });
        });
        localStorage.setItem('hwData', JSON.stringify(rows));
    }

    function addSubject(name = '', work = '') {
        const div = document.createElement('div');
        div.className = 'input-row';
        div.innerHTML = `
            <input type="text" class="sub-n" value="${name}" oninput="saveData()">
            <input type="text" class="sub-w" value="${work}" placeholder="Details..." oninput="saveData()">
        `;
        container.appendChild(div);
    }

    function clearAllData() {
        if(confirm("Delete all data?")) {
            localStorage.removeItem('hwData');
            loadData();
            document.getElementById('result-area').style.display = 'none';
            showMsg("🧹 Data Cleared!");
        }
    }

    function showMsg(m) {
        alertBox.innerText = m;
        alertBox.classList.add('show');
        setTimeout(() => alertBox.classList.remove('show'), 2500);
    }

    document.getElementById('btn-gen').onclick = async () => {
        let rows = '';
        let valid = false;
        document.querySelectorAll('.input-row').forEach(row => {
            const n = row.querySelector('.sub-n').value;
            const w = row.querySelector('.sub-w').value;
            if(w.trim()) {
                valid = true;
                rows += `<tr><td class="tag-sub">${n}</td><td style="padding-left:15px;">${w}</td></tr>`;
            }
        });

        if(!valid) return showMsg("⚠️ Kripya homework bhariye!");

        const d = new Date();
        const dateStr = d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getFullYear();
        document.getElementById('date-label').innerHTML = "📅 Date: " + dateStr;
        document.getElementById('hw-table').innerHTML = rows;

        setTimeout(async () => {
            const canvas = await html2canvas(document.getElementById('capture-area'), { scale: 2, useCORS: true });
            document.getElementById('preview-img').src = canvas.toDataURL();
            document.getElementById('result-area').style.display = 'block';
            document.getElementById('result-area').scrollIntoView({behavior:'smooth'});
        }, 300);
    };

    document.getElementById('btn-share').onclick = async () => {
        const blob = await (await fetch(document.getElementById('preview-img').src)).blob();
        const file = new File([blob], 'Homework.png', {type:'image/png'});
        if(navigator.share) navigator.share({files:[file]});
    };

    document.getElementById('btn-down').onclick = () => {
        const a = document.createElement('a');
        a.href = document.getElementById('preview-img').src;
        a.download = 'Homework.png';
        a.click();
    };

    loadData();
</script>
<script>
    document.getElementById('btn-gen').onclick = async () => {
    let rows = '';
    let valid = false;
    document.querySelectorAll('.input-row').forEach(row => {
        const n = row.querySelector('.sub-n').value;
        const w = row.querySelector('.sub-w').value;
        if(w.trim()) {
            valid = true;
            rows += `<tr><td class="tag-sub">${n}</td><td style="padding-left:15px;">${w}</td></tr>`;
        }
    });

    if(!valid) return showMsg("⚠️ Kripya homework bhariye!");

    // --- Loading Show Karo ---
    const loader = document.getElementById('loading-overlay');
    loader.style.display = 'flex';

    const d = new Date();
    const dateStr = d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getFullYear();
    document.getElementById('date-label').innerHTML = "🗓️ Date: " + dateStr;
    document.getElementById('hw-table').innerHTML = rows;

    // Chhota sa delay taaki UI update ho sake
    setTimeout(async () => {
        try {
            const canvas = await html2canvas(document.getElementById('capture-area'), { 
                scale: 2, 
                useCORS: true,
                logging: false 
            });
            
            document.getElementById('preview-img').src = canvas.toDataURL();
            document.getElementById('result-area').style.display = 'block';
            document.getElementById('result-area').scrollIntoView({behavior:'smooth'});
            
        } catch (err) {
            showMsg("❌ Error generating image");
            console.error(err);
        } finally {
            // --- Loading Chhupao ---
            loader.style.display = 'none';
        }
    }, 500); // 500ms ka delay taaki animation feel ho
};

</script>
</body>
</html>
